<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>睿嶼 內容管理</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
  <!-- 登入 -->
  <div id="login" class="login-wrap">
    <form class="login-card" id="loginForm">
      <h1>睿嶼 內容管理</h1>
      <div class="sub">RUIYU STUDIO · ADMIN</div>
      <div class="field">
        <label for="email">帳號 Email</label>
        <input type="email" id="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">密碼</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit" style="width:100%">登入</button>
      <div class="msg err" id="loginMsg"></div>
    </form>
  </div>

  <!-- 後台 -->
  <div id="app" style="display:none">
    <div class="topbar">
      <div class="brand">睿嶼 內容管理 <small>ADMIN</small></div>
      <div class="right">
        <a class="view-site" href="index.html" target="_blank">看官網 ↗</a>
        <button class="btn btn-ghost btn-sm" id="logout" style="border-color:rgba(255,255,255,.3);color:#e9dcc6">登出</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="wrap" id="view"><div class="loading">載入中…</div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/admin.js"></script>
</body>
</html>
